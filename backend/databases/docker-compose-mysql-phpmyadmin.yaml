# คำสั่งสำหรับใช้งาน (จดไว้ดูเอง)
# docker compose -f docker-compose-mysql-phpmyadmin.yaml up -d
# docker compose -f docker-compose-mysql-phpmyadmin.yaml down

networks:
  mysql-network:
    name: mysql-network

services:
  mysql:
    image: mysql:latest
    container_name: mysql
    restart: always
    ports:
      - 3306:3306
    volumes:
       - ./mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jwt
      MYSQL_USER: siwawong
      MYSQL_PASSWORD: 67122203
    networks:
      - mysql-network
      
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      PMA_HOST: mysql
      PMA_ARBITRARY: 1              
    networks:
      - mysql-network